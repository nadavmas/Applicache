AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AppliCache backend — Cognito, DynamoDB single table, resumes S3, Post Confirmation Lambda

Parameters:
  OpenAIApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: OpenAI API key for POST /boards/{boardId}/smart-cache

  AllowedCorsOrigins:
    Type: CommaDelimitedList
    Default: "http://localhost:5173,https://appli-cache.vercel.app,https://applicache-git-main-nadavmas-projects.vercel.app"
    Description: Browser origins allowed for CORS (boards Lambda + OPTIONS + resumes S3). No trailing slashes.

  CorsGatewayErrorOrigin:
    Type: String
    Default: "https://appli-cache.vercel.app"
    Description: Single Access-Control-Allow-Origin for API Gateway DEFAULT_4XX/DEFAULT_5XX (authorizer errors). Override for local-first dev if needed.

Globals:
  Function:
    Timeout: 30
    MemorySize: 256

Resources:
  AppliCacheData:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AppliCacheData
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  AppliCacheResumesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # S3 bucket names must be DNS-compliant and lowercase only; do not use AWS::StackName (often mixed case).
      BucketName: !Sub
        - "applicache-r-${Acct}-${StackUid}"
        - Acct: !Ref AWS::AccountId
          StackUid: !Select [2, !Split ["/", !Ref AWS::StackId]]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - Id: ApplicacheResumesBrowserUploads
            AllowedOrigins: !Split [",", !Join [",", !Ref AllowedCorsOrigins]]
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - "*"
              - Content-Type
            ExposedHeaders:
              - ETag
            MaxAge: 3000

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-PostConfirmation"
      Description: Writes user profile to AppliCacheData after Cognito post-confirmation
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: functions/postConfirmation/
      Environment:
        Variables:
          TABLE_NAME: !Ref AppliCacheData
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt AppliCacheData.Arn

  PostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: applicache-users
      AliasAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: given_name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: family_name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: birthdate
          AttributeDataType: String
          Required: true
          Mutable: true
      UsernameConfiguration:
        CaseSensitive: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: applicache-web
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  ApplicacheRestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${AWS::StackName}-rest"
      StageName: Prod
      Auth:
        DefaultAuthorizer: MyCognitoAuthorizer
        # REST SAM: singular Authorizer. Do not use HttpApi AddDefaultAuthorizersToCorsPreflight (invalid here).
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          MyCognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            Identity:
              Header: Authorization
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: !Sub "'${CorsGatewayErrorOrigin}'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,POST,PATCH,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: !Sub "'${CorsGatewayErrorOrigin}'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,POST,PATCH,DELETE,OPTIONS'"

  BoardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-Boards"
      Description: List and create boards (single-table PK/SK)
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: functions/boards/
      Environment:
        Variables:
          TABLE_NAME: !Ref AppliCacheData
          OPENAI_API_KEY: !Ref OpenAIApiKey
          CORS_ALLOWED_ORIGINS: !Join [",", !Ref AllowedCorsOrigins]
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
              Resource: !GetAtt AppliCacheData.Arn
      Events:
        ListBoards:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards
            Method: GET
        GetBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}
            Method: GET
        CreateBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards
            Method: POST
        UpdateBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}
            Method: PATCH
        DeleteBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}
            Method: DELETE
        AddBoardEntry:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}/entries
            Method: POST
        UpdateBoardEntry:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}/entries/{rowId}
            Method: PATCH
        DeleteBoardEntry:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}/entries/{rowId}
            Method: DELETE
        SmartCache:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}/smart-cache
            Method: POST
        BoardsCollectionOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        BoardItemOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        BoardEntriesCollectionOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}/entries
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        BoardEntryItemOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}/entries/{rowId}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        SmartCacheOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards/{boardId}/smart-cache
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  GenerateResumeUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-GenerateResumeUploadUrl"
      Description: Issue short-lived S3 pre-signed PUT URL for resume uploads
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: functions/resumes/generateUploadUrl/
      Environment:
        Variables:
          RESUMES_BUCKET_NAME: !Ref AppliCacheResumesBucket
          CORS_ALLOWED_ORIGINS: !Join [",", !Ref AllowedCorsOrigins]
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${AppliCacheResumesBucket.Arn}/*"
      Events:
        ResumeUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /resumes/upload-url
            Method: POST
        ResumeUploadUrlOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /resumes/upload-url
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  CreateResumeMetadataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CreateResumeMetadata"
      Description: Verify S3 object then persist resume metadata to AppliCacheData
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: functions/resumes/createMetadata/
      Environment:
        Variables:
          TABLE_NAME: !Ref AppliCacheData
          RESUMES_BUCKET_NAME: !Ref AppliCacheResumesBucket
          CORS_ALLOWED_ORIGINS: !Join [",", !Ref AllowedCorsOrigins]
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt AppliCacheData.Arn
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${AppliCacheResumesBucket.Arn}/*"
      Events:
        CreateResume:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /resumes
            Method: POST
        ResumesCollectionOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /resumes
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  ListResumesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ListResumes"
      Description: List resume metadata for the current user (DynamoDB query)
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: functions/resumes/list/
      Environment:
        Variables:
          TABLE_NAME: !Ref AppliCacheData
          CORS_ALLOWED_ORIGINS: !Join [",", !Ref AllowedCorsOrigins]
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt AppliCacheData.Arn
      Events:
        ListResumes:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /resumes
            Method: GET

Outputs:
  AppliCacheDataTableName:
    Description: Single-table DynamoDB name (PK/SK)
    Value: !Ref AppliCacheData
    Export:
      Name: !Sub "${AWS::StackName}-AppliCacheDataTableName"

  AppliCacheDataTableArn:
    Description: ARN of the AppliCacheData table
    Value: !GetAtt AppliCacheData.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AppliCacheDataTableArn"

  AppliCacheResumesBucketName:
    Description: S3 bucket for user resume uploads (private; pre-signed URL access later)
    Value: !Ref AppliCacheResumesBucket
    Export:
      Name: !Sub "${AWS::StackName}-AppliCacheResumesBucketName"

  AppliCacheResumesBucketArn:
    Description: ARN of the resumes S3 bucket
    Value: !GetAtt AppliCacheResumesBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AppliCacheResumesBucketArn"

  PostConfirmationFunctionArn:
    Description: Post Confirmation Lambda ARN
    Value: !GetAtt PostConfirmationFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-PostConfirmationFunctionArn"

  RestApiUrl:
    Description: REST API base URL including stage (set VITE_API_URL in frontend, no trailing slash)
    Value: !Sub https://${ApplicacheRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
    Export:
      Name: !Sub "${AWS::StackName}-RestApiUrl"
