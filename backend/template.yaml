AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AppliCache backend — Cognito, DynamoDB single table, Post Confirmation Lambda

Globals:
  Function:
    Timeout: 30
    MemorySize: 256

Resources:
  AppliCacheData:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AppliCacheData
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-PostConfirmation"
      Description: Writes user profile to AppliCacheData after Cognito post-confirmation
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: functions/postConfirmation/
      Environment:
        Variables:
          TABLE_NAME: !Ref AppliCacheData
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt AppliCacheData.Arn

  PostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: applicache-users
      AliasAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: given_name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: family_name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: birthdate
          AttributeDataType: String
          Required: true
          Mutable: true
      UsernameConfiguration:
        CaseSensitive: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: applicache-web
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  ApplicacheRestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${AWS::StackName}-rest"
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'http://localhost:5173'"
      Auth:
        DefaultAuthorizer: MyCognitoAuthorizer
        # REST SAM: singular Authorizer. Do not use HttpApi AddDefaultAuthorizersToCorsPreflight (invalid here).
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          MyCognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            Identity:
              Header: Authorization
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'http://localhost:5173'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'http://localhost:5173'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"

  BoardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-Boards"
      Description: List and create boards (single-table PK/SK)
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: functions/boards/
      Environment:
        Variables:
          TABLE_NAME: !Ref AppliCacheData
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:PutItem
              Resource: !GetAtt AppliCacheData.Arn
      Events:
        ListBoards:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards
            Method: GET
        CreateBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ApplicacheRestApi
            Path: /boards
            Method: POST

Outputs:
  AppliCacheDataTableName:
    Description: Single-table DynamoDB name (PK/SK)
    Value: !Ref AppliCacheData
    Export:
      Name: !Sub "${AWS::StackName}-AppliCacheDataTableName"

  AppliCacheDataTableArn:
    Description: ARN of the AppliCacheData table
    Value: !GetAtt AppliCacheData.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AppliCacheDataTableArn"

  PostConfirmationFunctionArn:
    Description: Post Confirmation Lambda ARN
    Value: !GetAtt PostConfirmationFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-PostConfirmationFunctionArn"

  RestApiUrl:
    Description: REST API base URL including stage (set VITE_API_URL in frontend, no trailing slash)
    Value: !Sub https://${ApplicacheRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
    Export:
      Name: !Sub "${AWS::StackName}-RestApiUrl"
