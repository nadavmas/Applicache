<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AppliCache</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup-container">
      <header class="popup-header">
        <div class="popup-logo-frame">
          <img
            class="popup-logo"
            src="applicache_logo.png"
            alt="AppliCache"
          />
        </div>
      </header>

      <section id="auth-section" class="popup-card hidden" aria-live="polite">
        <p class="field-label">Signed in as</p>
        <p class="user-email" id="user-email"></p>

        <label class="field-label" for="board-select">Board</label>
        <select id="board-select" class="board-select" aria-describedby="cache-status">
          <option value="">Select a board…</option>
        </select>

        <button
          type="button"
          class="btn btn-primary"
          id="btn-cache"
          aria-busy="false"
        >
          <span class="btn__spinner" aria-hidden="true"></span>
          <span class="btn__label">Cache this application</span>
        </button>

        <p
          class="cache-status"
          id="cache-status"
          role="status"
          aria-live="polite"
        ></p>

        <button
          type="button"
          class="btn btn-secondary btn-view-board hidden"
          id="btn-view-board"
          data-board-id=""
        >
          Take a look at your board
        </button>

        <button type="button" class="btn btn-secondary" id="btn-logout">
          Log out
        </button>
      </section>

      <section id="login-section" class="popup-card">
        <p class="login-message" id="login-message">
          Please log in to start caching jobs.
        </p>
        <button type="button" class="btn btn-primary" id="btn-login">
          Log in
        </button>
      </section>

      <div
        id="preview-area"
        class="preview-container hidden"
        aria-hidden="true"
        role="region"
        aria-label="Review extracted fields before saving"
      >
        <p
          id="preview-cache-status"
          class="cache-status preview-cache-status hidden"
          role="status"
          aria-live="polite"
        ></p>
        <div id="preview-body"></div>
      </div>
    </div>
    <script src="config.js"></script>
    <script src="env.local.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
